# ─────────────────────────────────────────────────────────────────────────────
#  nas-web.conf — NAS Panel production
# ─────────────────────────────────────────────────────────────────────────────

worker_processes    0;
worker_connections  4096;
cache_size          1024;
cache_ttl           60;
log_level           info;
pid_file            /var/run/nas-web.pid;
scripts_dir         /etc/nas-web/scripts;

# Admin panel — zmien haslo przed uruchomieniem!
admin_user          admin;
admin_password      nas-web-admin;
admin_tls_only      off;    # Ustawienie połączenia tylko poprzez tls/ssl
# Ogranicz dostep do panelu tylko z sieci lokalnej (opcjonalne):
# admin_allow_ips     192.168.1.  10.0.0.;

# Backend API
upstream node_api {
    server 127.0.0.1:1112;
    keepalive 32;
}

server {
    listen 80;
    listen 443 ssl;   # Self-signed cert auto-generated at startup (no ssl_cert needed)
                      # Przeglądarka pokaże ostrzeżenie — kliknij "Zaawansowane > Przejdź"
                      # Dla prawdziwego cert: ssl_cert /path/cert.pem; ssl_key /path/key.pem;
                      # Dla PWA na Android: wymagane HTTPS — self-signed wystarczy w LAN

    keepalive_timeout    65;
    keepalive_requests   1000;
    client_max_body_size 67108864;

    access_log  /var/log/nas-web/access.log;
    error_log   /var/log/nas-web/error.log;

    # API backend
    location /api {
        proxy_pass    node_api;
        proxy_timeout 30;
        cache         off;
    }

    # WebSocket
    location /ws {
        proxy_pass    node_api;
        websocket     on;
        proxy_timeout 3600;
        cache         off;
    }

    # Statyczne assety (hash w nazwie = dlugi cache)
    location /assets {
        root      /opt/nas-panel/dist;
        cache     max_age=31536000;
        gzip      on;
        etag      on;
    }

    # SPA fallback
    location / {
        root      /opt/nas-panel/dist;
        cache     max_age=0;
        gzip      on;
        etag      on;
    }
}

# ─── Przykład konfiguracji ACME z DNS-01 (wildcard cert) ─────────────────────
# acme {
#     email           admin@nasserver.pl;
#     domains         nasserver.pl *.nasserver.pl;
#     staging         false;
#     cert_dir        /etc/nas-web/certs;
#     challenge       dns-01;           # "http-01" (domyslne) lub "dns-01"
#     dns_provider    cloudflare;       # "cloudflare" lub "exec"
#     dns_cf_token    TOKEN_Z_CLOUDFLARE_DASHBOARD;
#     dns_cf_zone     ZONE_ID;          # opcjonalne - auto-detect z nazwy domeny
#     # Alternatywnie wlasny skrypt:
#     # dns_provider  exec;
#     # dns_exec      /etc/nas-web/dns-hook.sh;   # wywolanie: add|remove DOMAIN VALUE
# }

