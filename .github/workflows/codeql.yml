# .github/workflows/codeql.yml
name: "CodeQL Security Scan"

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # Uruchom raz dziennie o 2:30 UTC
    - cron: '30 2 * * *'

jobs:
  analyze:
    name: CodeQL Analyze (C++)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Instalacja zależności systemowych
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          pkg-config \
          liblua5.4-dev \
          libuv1-dev \
          libssl-dev \
          libbrotli-dev \
          libnghttp2-dev \
          libmodsecurity-dev \
          libmodsecurity3 \
          modsecurity-crs

    # Pobranie vendored dependencies jeśli potrzebne
    - name: Fetch vendored dependencies
      run: |
        if [ -f vendor/quickjs/fetch_quickjs.sh ]; then
          bash vendor/quickjs/fetch_quickjs.sh
        fi
        if [ -f vendor/zstd/fetch_zstd.sh ]; then
          bash vendor/zstd/fetch_zstd.sh
        fi
        if [ -f vendor/janet/fetch_janet.sh ]; then
          bash vendor/janet/fetch_janet.sh
        fi

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: c-cpp
        build-mode: manual
        # Dostosuj zapytania do projektu C++
        queries: security-and-quality
        config: |
          name: "nas-web CodeQL config"
          paths:
            - src
            - include
            - tests
          paths-ignore:
            - vendor
            - build
            - debian
          queries:
            - uses: security-and-quality
          # Wyklucz warningi które nie są istotne
          query-filters:
            - exclude:
                id: cpp/path-injection  # analizowane przez WAF
            - exclude:
                id: cpp/weak-cryptographic-algorithm  # używamy OpenSSL 3

    # Build dla C/C++ z odpowiednimi flagami
    - name: Configure and build
      run: |
        mkdir -p build
        cmake -S . -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DWITH_LUA=ON \
          -DWITH_QUICKJS=ON \
          -DWITH_NGHTTP2=ON \
          -DWITH_BROTLI=ON \
          -DWITH_ACME=ON \
          -DWITH_MODSEC=ON \
          -DWITH_ZSTD=ON \
          -DWITH_JANET=ON \
          -DWITH_QUICHE=OFF
        cmake --build build --parallel $(nproc)

    # Perform the CodeQL analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:c-cpp"
        output: codeql-results
        upload: true

    # Dodatkowe: Zapisz wyniki jako artifact
    - name: Upload SARIF results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: codeql-results
        path: codeql-results
        retention-days: 30

  # Dodatkowe: Security scanning dla zależności
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, BSL-1.0
          comment-summary-in-pr: always

  # Binary hardening check
  hardening-check:
    name: Binary hardening check
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with hardening flags
        run: |
          mkdir -p build-hardened
          cmake -S . -B build-hardened \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-fstack-protector-strong -D_FORTIFY_SOURCE=2 -Wp,-D_GLIBCXX_ASSERTIONS -fpie -pie" \
            -DWITH_LUA=ON \
            -DWITH_MODSEC=ON
          cmake --build build-hardened --parallel $(nproc)

      - name: Run hardening-check
        run: |
          sudo apt-get install -y devscripts
          hardening-check build-hardened/nas-web | tee hardening-report.txt

      - name: Upload hardening report
        uses: actions/upload-artifact@v4
        with:
          name: hardening-report
          path: hardening-report.txt

  # Prosty fuzzer dla HTTP parsera (opcjonalnie)
  fuzzing:
    name: Continuous Fuzzing (smoke test)
    runs-on: ubuntu-latest
    if: false  # Wyłączone domyślnie, włącz jeśli masz testy fuzzingowe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install AFL++
        run: |
          sudo apt-get install -y afl++
      
      - name: Build with fuzzing
        run: |
          mkdir -p build-fuzz
          cd build-fuzz
          CC=afl-gcc-fast CXX=afl-g++-fast cmake .. \
            -DENABLE_FUZZING=ON \
            -DWITH_MODSEC=OFF
          make -j$(nproc)
      
      - name: Run fuzzer (quick test)
        run: |
          mkdir -p fuzz-input
          echo "GET / HTTP/1.1" > fuzz-input/sample
          afl-fuzz -i fuzz-input -o fuzz-output -t 1000 -- build-fuzz/nas-web-fuzzer || true
