name: CodeQL

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 4 * * 1'   # co poniedziałek 04:00 UTC

jobs:
  analyze:
    name: Analyze (C/C++)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake pkg-config \
            libuv1-dev libssl-dev zlib1g-dev \
            libbrotli-dev libnghttp2-dev \
            liblua5.4-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - vendor/quickjs
              - vendor/zstd
              - vendor/janet
              - vendor/cssmin
              - vendor/lua-cjson
              - vendor/sqlite

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DWITH_LUA=ON \
            -DWITH_QUICKJS=OFF \
            -DWITH_NGHTTP2=ON \
            -DWITH_BROTLI=ON \
            -DWITH_ACME=ON \
            -DWITH_ZSTD=OFF \
            -DWITH_JANET=OFF \
            -DWITH_MODSEC=OFF \
            -DWITH_QUICHE=OFF \
            -DWITH_SQLITE=ON \
            -DWITH_LUA_CJSON=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:c-cpp
