name: Build .deb package

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-deb:
    name: Build nas-web .deb
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        with_modsec: [ON, OFF]
        with_zstd: [ON, OFF]
        with_janet: [ON, OFF]

    steps:
      - uses: actions/checkout@v4

      - name: Install base build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            dpkg-dev \
            git \
            ca-certificates \
            libuv1-dev \
            libssl-dev \
            libbrotli-dev \
            libnghttp2-dev \
            liblua5.4-dev \
            zlib1g-dev \
            libmodsecurity-dev \
            libpcre2-dev \
            libxml2-dev \
            libyajl-dev \
            libcurl4-openssl-dev \
            libmaxminddb-dev \
            libgeoip-dev \
            libzstd-dev

      - name: Fetch submodules / vendors
        run: |
          echo "Fetch vendors if needed"
          if [ -f "vendor/janet/fetch_janet.sh" ]; then bash vendor/janet/fetch_janet.sh; fi
          if [ -f "vendor/quickjs/fetch_quickjs.sh" ]; then bash vendor/quickjs/fetch_quickjs.sh; fi
          if [ -f "vendor/zstd/fetch_zstd.sh" ]; then bash vendor/zstd/fetch_zstd.sh; fi

      - name: Extract version from changelog
        id: version
        run: |
          VERSION=$(head -1 debian/changelog | grep -oP '\(\K[^)]+' | head -1 | sed 's/-[0-9]*$//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Run build-deb.sh
        run: |
          ARGS=""
          if [ "${{ matrix.with_modsec }}" = "ON" ]; then ARGS="$ARGS --with-modsec"; fi
          if [ "${{ matrix.with_zstd }}" = "ON" ]; then ARGS="$ARGS --with-zstd"; fi
          if [ "${{ matrix.with_janet }}" = "ON" ]; then ARGS="$ARGS --with-janet"; fi
          bash build-deb.sh $ARGS

      - name: Rename .deb package with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MODSEC="${{ matrix.with_modsec }}"
          ZSTD="${{ matrix.with_zstd }}"
          JANET="${{ matrix.with_janet }}"
          
          # Znajdź wygenerowany plik .deb
          ORIGINAL_DEB=$(ls *.deb | head -1)
          
          if [ -n "$ORIGINAL_DEB" ]; then
            NEW_NAME="nas-web-${VERSION}-modsec${MODSEC}-zstd${ZSTD}-janet${JANET}.deb"
            mv "$ORIGINAL_DEB" "$NEW_NAME"
            echo "Renamed: $ORIGINAL_DEB -> $NEW_NAME"
            echo "deb_name=$NEW_NAME" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No .deb file found!"
            exit 1
          fi
        id: rename

      - name: Upload .deb package
        uses: actions/upload-artifact@v4
        with:
          name: nas-web-${{ steps.version.outputs.version }}-modsec${{ matrix.with_modsec }}-zstd${{ matrix.with_zstd }}-janet${{ matrix.with_janet }}
          path: ${{ steps.rename.outputs.deb_name }}
          retention-days: 7

      - name: List generated packages
        run: |
          echo "Generated packages:"
          ls -la *.deb
