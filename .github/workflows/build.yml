name: Build .deb package

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-deb:
    name: Build nas-web .deb
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        with_modsec: [ON, OFF]
        with_zstd: [ON]
        with_janet: [ON]

    steps:
      - uses: actions/checkout@v4

      - name: Install base build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            dpkg-dev \
            git \
            ca-certificates \
            libuv1-dev \
            libssl-dev \
            libbrotli-dev \
            libnghttp2-dev \
            liblua5.4-dev \
            zlib1g-dev \
            libmodsecurity-dev \
            libpcre2-dev \
            libxml2-dev \
            libyajl-dev \
            libcurl4-openssl-dev \
            libmaxminddb-dev \
            libgeoip-dev \
            libzstd-dev

      - name: Fetch submodules / vendors
        run: |
          echo "Fetch vendors if needed"
          bash vendor/janet/fetch_janet.sh
          bash vendor/quickjs/fetch_quickjs.sh
          bash vendor/zstd/fetch_zstd.sh

      - name: Run build-deb.sh
        run: |
          ARGS=""
          if [ "${{ matrix.with_modsec }}" = "ON" ]; then ARGS="$ARGS --with-modsec"; fi
          if [ "${{ matrix.with_zstd }}" = "ON" ]; then ARGS="$ARGS --with-zstd"; fi
          if [ "${{ matrix.with_janet }}" = "ON" ]; then ARGS="$ARGS --with-janet"; fi
          bash build-deb.sh $ARGS

      - name: Upload .deb package
        uses: actions/upload-artifact@v4
        with:
          name: nas-web-${{ matrix.with_modsec }}-${{ matrix.with_zstd }}-${{ matrix.with_janet }}.deb
          path: ./*.deb
          retention-days: 7
